<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>QR Master Pro - منصة توليد أكواد QR المتكاملة</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        /* ============================================
           CSS Variables & Global Styles
           ============================================ */
        
         :root {
            --bg-primary: #f0f2f5;
            --bg-container: rgba(255, 255, 255, 0.98);
            --text-primary: #2c3e50;
            --text-secondary: #34495e;
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            --border-color: #e0e0e0;
            --gradient-start: #667eea;
            --gradient-end: #764ba2;
            --card-bg: #ffffff;
            --input-bg: #ffffff;
        }
        
        [data-theme="dark"] {
            --bg-primary: #1a1a2e;
            --bg-container: rgba(30, 30, 60, 0.98);
            --text-primary: #e0e0e0;
            --text-secondary: #b0b0b0;
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            --border-color: #444;
            --card-bg: #2a2a4a;
            --input-bg: #3a3a5a;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            transition: background-color 0.3s ease;
        }
        
        .container {
            background: var(--bg-container);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 30px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 550px;
            text-align: center;
            box-sizing: border-box;
            position: relative;
        }
        /* ============================================
           Header & Badges
           ============================================ */
        
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .premium-badge {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
        }
        
        .theme-toggle {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 50%;
            transition: all 0.3s;
            background: rgba(102, 126, 234, 0.1);
        }
        
        .theme-toggle:hover {
            transform: rotate(20deg);
            background: rgba(102, 126, 234, 0.2);
        }
        
        h2 {
            background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-end) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 15px;
            font-size: 28px;
        }
        /* ============================================
           Subscription Card
           ============================================ */
        
        .subscription-card {
            background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-end) 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .subscription-card .status-text {
            font-size: 13px;
            opacity: 0.9;
        }
        
        .subscribe-btn {
            background: white;
            color: var(--gradient-start);
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .subscribe-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .reset-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 5px 10px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.3s;
        }
        
        .reset-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        /* ============================================
           Tabs
           ============================================ */
        
        .tabs {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            background: var(--border-color);
            border-radius: 10px;
            padding: 5px;
        }
        
        .tab-btn {
            background: none;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            font-weight: bold;
            color: var(--text-secondary);
            transition: all 0.3s;
            border-radius: 8px;
            flex: 1;
            font-size: 14px;
        }
        
        .tab-btn.active {
            background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-end) 100%);
            color: white;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }
        
        .tab-btn:hover:not(.active) {
            background: rgba(102, 126, 234, 0.1);
        }
        /* ============================================
           Form Sections
           ============================================ */
        
        .form-section {
            display: none;
            text-align: right;
        }
        
        .form-section.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .input-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 14px;
        }
        
        input,
        textarea,
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border-color);
            background: var(--input-bg);
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 15px;
            color: var(--text-primary);
            transition: all 0.3s;
        }
        
        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: var(--gradient-start);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        textarea {
            resize: vertical;
            min-height: 60px;
        }
        /* ============================================
           Premium Features
           ============================================ */
        
        .premium-feature {
            position: relative;
            border: 2px solid #ffd700;
            border-radius: 10px;
            padding: 15px;
            margin-top: 15px;
            background: rgba(255, 215, 0, 0.05);
        }
        
        .premium-label {
            position: absolute;
            top: -12px;
            right: 10px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
        }
        /* ============================================
           Controls
           ============================================ */
        
        .size-control {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-top: 10px;
        }
        
        .size-control input[type="range"] {
            flex: 1;
            padding: 0;
            height: 6px;
            border-radius: 3px;
            background: var(--border-color);
            -webkit-appearance: none;
        }
        
        .size-control input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            cursor: pointer;
        }
        
        .size-value {
            min-width: 50px;
            font-weight: bold;
            color: var(--gradient-start);
        }
        
        .color-picker-group {
            display: flex;
            gap: 15px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        
        .color-picker-group label {
            flex: 1;
            min-width: 120px;
        }
        
        .color-picker-group input[type="color"] {
            padding: 5px;
            height: 45px;
            cursor: pointer;
        }
        
        .color-preview {
            display: flex;
            gap: 15px;
            margin-top: 10px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .color-box {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            border: 2px solid var(--border-color);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        
        .color-label {
            font-size: 12px;
            color: var(--text-secondary);
            text-align: center;
        }
        
        .logo-upload {
            margin-top: 10px;
        }
        
        .logo-upload input[type="file"] {
            padding: 10px;
            border: 2px dashed var(--border-color);
            border-radius: 10px;
            cursor: pointer;
        }
        /* ============================================
           Error & Success Messages
           ============================================ */
        
        .warning-text {
            color: #e74c3c;
            font-size: 12px;
            margin-top: 5px;
            min-height: 20px;
        }
        
        .success-text {
            color: #27ae60;
            font-size: 12px;
            margin-top: 5px;
        }
        /* ============================================
           Buttons
           ============================================ */
        
        .gen-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-end) 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
        }
        
        .gen-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .gen-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .gen-btn:active:not(:disabled) {
            transform: translateY(0);
        }
        /* ============================================
           QR Result
           ============================================ */
        
        .qr-result {
            margin-top: 25px;
            display: none;
            animation: fadeIn 0.5s ease;
        }
        
        .qr-container {
            position: relative;
            display: inline-block;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }
        
        #qr-canvas {
            max-width: 100%;
            height: auto;
            display: block;
        }
        
        .qr-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .download-btn {
            padding: 10px 25px;
            background: #27ae60;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .download-btn:hover {
            background: #2ecc71;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.3);
        }
        
        .download-btn.danger {
            background: #e74c3c;
        }
        
        .download-btn.danger:hover {
            background: #c0392b;
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.3);
        }
        
        .format-select {
            padding: 10px 15px;
            border-radius: 8px;
            border: 2px solid var(--border-color);
            background: var(--input-bg);
            color: var(--text-primary);
            font-size: 14px;
            cursor: pointer;
        }
        /* ============================================
           Statistics
           ============================================ */
        
        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
            padding: 10px;
            background: var(--border-color);
            border-radius: 10px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-item .number {
            font-size: 20px;
            font-weight: bold;
            color: var(--gradient-start);
        }
        
        .stat-item .label {
            font-size: 11px;
            color: var(--text-secondary);
        }
        /* ============================================
           Animations
           ============================================ */
        
        @keyframes shake {
            0%,
            100% {
                transform: translateX(0);
            }
            25% {
                transform: translateX(-5px);
            }
            75% {
                transform: translateX(5px);
            }
        }
        
        .locked {
            animation: shake 0.3s ease-in-out;
        }
        
        .disabled-input {
            opacity: 0.6;
            cursor: not-allowed;
        }
        /* ============================================
           Responsive
           ============================================ */
        
        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }
            .subscription-card {
                flex-direction: column;
                text-align: center;
            }
            .tabs {
                flex-wrap: wrap;
            }
            .tab-btn {
                font-size: 12px;
                padding: 8px 10px;
                min-width: 80px;
            }
            .qr-actions {
                flex-direction: column;
                align-items: stretch;
            }
            .format-select {
                width: 100%;
            }
            .color-picker-group {
                flex-direction: column;
            }
            h2 {
                font-size: 22px;
            }
        }
        
        @media (max-width: 380px) {
            .container {
                padding: 15px;
            }
            .tab-btn {
                font-size: 10px;
                padding: 6px 8px;
                min-width: 60px;
            }
        }
        /* ============================================
           Scrollbar Styling
           ============================================ */
        
         ::-webkit-scrollbar {
            width: 8px;
        }
        
         ::-webkit-scrollbar-track {
            background: var(--border-color);
            border-radius: 4px;
        }
        
         ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            border-radius: 4px;
        }
        
         ::-webkit-scrollbar-thumb:hover {
            background: var(--gradient-end);
        }
    </style>
</head>

<body>

    <div class="container">
        <!-- ========== HEADER ========== -->
        <div class="header-top">
            <div class="premium-badge">✨ PRO VERSION ✨</div>
            <button class="theme-toggle" onclick="toggleTheme()" title="تبديل الوضع المظلم">🌙</button>
        </div>

        <h2>QR Master Pro</h2>

        <!-- ========== SUBSCRIPTION CARD ========== -->
        <div class="subscription-card" id="subscriptionCard">
            <div>
                <div class="status-text" id="userStatus">👤 مستخدم مجاني</div>
            </div>
            <div style="display:flex; gap:8px; align-items:center;">
                <button class="subscribe-btn" onclick="showSubscriptionPlans()">⭐ تفعيل الميزات</button>
                <button class="reset-btn" onclick="resetUserStatus()" style="display:none;">🔄 إعادة تعيين</button>
            </div>
        </div>

        <!-- ========== TABS ========== -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab(event, 'wifi')">📡 واي فاي</button>
            <button class="tab-btn" onclick="switchTab(event, 'whatsapp')">💬 واتساب</button>
            <button class="tab-btn" onclick="switchTab(event, 'vcard')">👤 بطاقة أعمال</button>
        </div>

        <!-- ========== WIFI SECTION ========== -->
        <div id="wifi-section" class="form-section active">
            <div class="input-group">
                <label>اسم شبكة الواي فاي (SSID):</label>
                <input type="text" id="wifi-ssid" placeholder="اكتب اسم الشبكة بالضبط" oninput="validateWifiSSID(this)">
                <div class="warning-text" id="wifi-ssid-error"></div>
            </div>
            <div class="input-group">
                <label>كلمة المرور:</label>
                <input type="password" id="wifi-pass" placeholder="أدخل كلمة مرور الشبكة">
                <div style="display:flex; gap:5px; margin-top:5px;">
                    <button type="button" class="reset-btn" style="background:#667eea; color:white; border:none; padding:3px 10px;" onclick="togglePasswordVisibility('wifi-pass')">👁️ إظهار</button>
                </div>
            </div>

            <div class="premium-feature" id="wifiSizeFeature">
                <div class="premium-label">⭐ ميزة مدفوعة</div>
                <label>حجم الكود المخصص (بكسل):</label>
                <div class="size-control">
                    <input type="range" id="wifi-size" min="150" max="500" value="250" disabled oninput="updateSizeDisplay('wifi-size', 'wifi-size-value')">
                    <span class="size-value" id="wifi-size-value">250px</span>
                </div>
            </div>

            <div class="input-group">
                <label>مستوى تصحيح الخطأ:</label>
                <select id="wifi-error-level">
                    <option value="L">منخفض (L) - 7%</option>
                    <option value="M" selected>متوسط (M) - 15%</option>
                    <option value="Q">مرتفع (Q) - 25%</option>
                    <option value="H">عالي جداً (H) - 30%</option>
                </select>
            </div>

            <button class="gen-btn" onclick="generateQR('wifi')">🚀 توليد كود الواي فاي</button>
        </div>

        <!-- ========== WHATSAPP SECTION ========== -->
        <div id="whatsapp-section" class="form-section">
            <div class="input-group">
                <label>رقم الهاتف (مع رمز الدولة):</label>
                <input type="tel" id="wa-phone" placeholder="مثال: 201000000000" oninput="validatePhone(this)">
                <div class="warning-text" id="wa-phone-error"></div>
            </div>
            <div class="input-group">
                <label>الرسالة التلقائية:</label>
                <textarea id="wa-msg" rows="3" placeholder="اكتب الرسالة المسبقة هنا" oninput="updateCharCount(this, 'wa-char-count')"></textarea>
                <div style="font-size:12px; color:var(--text-secondary); text-align:left;" id="wa-char-count">0 / 1000
                </div>
            </div>

            <div class="premium-feature" id="whatsappColorFeature">
                <div class="premium-label">⭐ ميزة مدفوعة</div>
                <label>تخصيص الألوان:</label>
                <div class="color-picker-group">
                    <label>
                        لون الخلفية:
                        <input type="color" id="wa-bg-color" value="#ffffff" disabled onchange="updateColorPreview()">
                    </label>
                    <label>
                        لون المقدمة:
                        <input type="color" id="wa-fg-color" value="#000000" disabled onchange="updateColorPreview()">
                    </label>
                </div>
                <div class="color-preview" id="colorPreview"></div>
                <div class="warning-text" id="color-warning"></div>
            </div>

            <button class="gen-btn" onclick="generateQR('whatsapp')">🚀 توليد كود واتساب</button>
        </div>

        <!-- ========== VCARD SECTION ========== -->
        <div id="vcard-section" class="form-section">
            <div class="input-group">
                <label>الاسم الكامل:</label>
                <input type="text" id="card-name" placeholder="الاسم الكامل">
            </div>
            <div class="input-group">
                <label>رقم الهاتف:</label>
                <input type="tel" id="card-phone" placeholder="رقم الموبايل" oninput="validatePhone(this)">
                <div class="warning-text" id="card-phone-error"></div>
            </div>
            <div class="input-group">
                <label>البريد الإلكتروني:</label>
                <input type="email" id="card-email" placeholder="name@example.com" oninput="validateEmail(this)">
                <div class="warning-text" id="card-email-error"></div>
            </div>

            <div class="premium-feature" id="vcardLogoFeature">
                <div class="premium-label">⭐ ميزة مدفوعة</div>
                <label>إضافة شعار للكود:</label>
                <div class="logo-upload">
                    <input type="file" id="vcard-logo" accept="image/*" disabled onchange="validateLogo(this)">
                    <div class="warning-text" id="logo-error"></div>
                </div>
            </div>

            <button class="gen-btn" onclick="generateQR('vcard')">🚀 توليد بطاقة الأعمال</button>
        </div>

        <!-- ========== STATISTICS ========== -->
        <div class="stats" style="margin-top:20px;">
            <div class="stat-item">
                <div class="number" id="total-count">0</div>
                <div class="label">إجمالي الأكواد</div>
            </div>
            <div class="stat-item">
                <div class="number" id="wifi-count">0</div>
                <div class="label">واي فاي</div>
            </div>
            <div class="stat-item">
                <div class="number" id="wa-count">0</div>
                <div class="label">واتساب</div>
            </div>
            <div class="stat-item">
                <div class="number" id="vcard-count">0</div>
                <div class="label">بطاقة أعمال</div>
            </div>
        </div>

        <!-- ========== QR RESULT ========== -->
        <div class="qr-result" id="qr-result-section">
            <div class="qr-container">
                <canvas id="qr-canvas"></canvas>
            </div>
            <div class="qr-actions">
                <select class="format-select" id="export-format">
                    <option value="png">PNG</option>
                    <option value="jpg">JPG</option>
                    <option value="svg">SVG</option>
                    <option value="pdf">PDF</option>
                </select>
                <button class="download-btn" onclick="downloadQR()">📥 تحميل</button>
                <button class="download-btn danger" onclick="downloadQRData()">📄 تحميل البيانات</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // CONFIGURATION
        // ============================================

        const ACTIVATION_CODE = "0155110";
        const MAX_LOGO_SIZE = 2 * 1024 * 1024; // 2MB
        const MAX_MESSAGE_LENGTH = 1000;

        let currentUser = {
            isPremium: false,
            plan: 'free',
            activatedAt: null
        };

        let stats = {
            total: 0,
            wifi: 0,
            whatsapp: 0,
            vcard: 0
        };

        let lastGeneratedQR = {
            text: '',
            options: {}
        };

        // ============================================
        // THEME MANAGEMENT
        // ============================================

        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);

            const btn = document.querySelector('.theme-toggle');
            btn.textContent = newTheme === 'dark' ? '☀️' : '🌙';

            localStorage.setItem('qr_theme', newTheme);
        }

        function loadTheme() {
            const savedTheme = localStorage.getItem('qr_theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            const btn = document.querySelector('.theme-toggle');
            btn.textContent = savedTheme === 'dark' ? '☀️' : '🌙';
        }

        // ============================================
        // USER STATE MANAGEMENT
        // ============================================

        function loadUserStatus() {
            try {
                const savedUser = localStorage.getItem('qr_user_premium');
                if (savedUser) {
                    const user = JSON.parse(savedUser);
                    if (user.isPremium === true) {
                        currentUser = user;
                    }
                }

                const savedStats = localStorage.getItem('qr_stats');
                if (savedStats) {
                    stats = JSON.parse(savedStats);
                }
            } catch (error) {
                console.error('Error loading data:', error);
            }
            updateUIForUser();
            updateStatsDisplay();
        }

        function saveUserStatus() {
            try {
                localStorage.setItem('qr_user_premium', JSON.stringify(currentUser));
                localStorage.setItem('qr_stats', JSON.stringify(stats));
            } catch (error) {
                console.error('Error saving data:', error);
            }
        }

        function resetUserStatus() {
            currentUser = {
                isPremium: false,
                plan: 'free',
                activatedAt: null
            };
            stats = {
                total: 0,
                wifi: 0,
                whatsapp: 0,
                vcard: 0
            };
            saveUserStatus();
            updateUIForUser();
            updateStatsDisplay();

            Swal.fire({
                icon: 'info',
                title: 'تم إعادة التعيين',
                text: 'تم العودة إلى الوضع المجاني وإعادة ضبط الإحصائيات',
                confirmButtonColor: '#667eea'
            });
        }

        function updateUIForUser() {
            const statusText = currentUser.isPremium ?
                `👑 مستخدم مميز - جميع الميزات مفعلة` :
                '👤 مستخدم مجاني - قم بتفعيل الميزات';
            document.getElementById('userStatus').textContent = statusText;

            // تفعيل/تعطيل الميزات المدفوعة
            const wifiSize = document.getElementById('wifi-size');
            const waBgColor = document.getElementById('wa-bg-color');
            const waFgColor = document.getElementById('wa-fg-color');
            const vcardLogo = document.getElementById('vcard-logo');

            if (wifiSize) {
                wifiSize.disabled = !currentUser.isPremium;
                wifiSize.classList.toggle('disabled-input', !currentUser.isPremium);
            }
            if (waBgColor) {
                waBgColor.disabled = !currentUser.isPremium;
                waBgColor.classList.toggle('disabled-input', !currentUser.isPremium);
            }
            if (waFgColor) {
                waFgColor.disabled = !currentUser.isPremium;
                waFgColor.classList.toggle('disabled-input', !currentUser.isPremium);
            }
            if (vcardLogo) {
                vcardLogo.disabled = !currentUser.isPremium;
                vcardLogo.classList.toggle('disabled-input', !currentUser.isPremium);
            }

            if (currentUser.isPremium) {
                updateColorPreview();
            } else {
                const previewContainer = document.getElementById('colorPreview');
                if (previewContainer) {
                    previewContainer.innerHTML = '<div class="warning-text">🔒 قم بتفعيل الميزات لتخصيص الألوان</div>';
                }
            }
        }

        function updateStatsDisplay() {
            document.getElementById('total-count').textContent = stats.total;
            document.getElementById('wifi-count').textContent = stats.wifi;
            document.getElementById('wa-count').textContent = stats.whatsapp;
            document.getElementById('vcard-count').textContent = stats.vcard;
        }

        function incrementStats(type) {
            stats.total++;
            if (type === 'wifi') stats.wifi++;
            else if (type === 'whatsapp') stats.whatsapp++;
            else if (type === 'vcard') stats.vcard++;
            saveUserStatus();
            updateStatsDisplay();
        }

        // ============================================
        // ACTIVATION SYSTEM
        // ============================================

        async function showSubscriptionPlans() {
            const {
                value: code
            } = await Swal.fire({
                title: '🔑 تفعيل الميزات المتقدمة',
                html: `
                    <div style="text-align: right;">
                        <p>أدخل كود التفعيل لفتح جميع الميزات المدفوعة:</p>
                        <p style="color: #667eea; font-size: 12px; margin-top: 10px;">✨ الميزات التي ستفعل:<br>
                        • تخصيص حجم الكود<br>
                        • تخصيص ألوان الكود<br>
                        • إضافة شعار مخصص</p>
                        <p style="color: #e74c3c; font-size: 11px; margin-top: 10px;">💡 كود التفعيل: 0155110</p>
                    </div>
                `,
                input: 'text',
                inputPlaceholder: 'أدخل كود التفعيل',
                inputAttributes: {
                    maxlength: 10,
                    autocapitalize: 'off',
                    autocomplete: 'off'
                },
                showCancelButton: true,
                confirmButtonText: 'تفعيل',
                cancelButtonText: 'إلغاء',
                confirmButtonColor: '#667eea',
                preConfirm: (inputCode) => {
                    if (!inputCode) {
                        Swal.showValidationMessage('الرجاء إدخال كود التفعيل');
                        return false;
                    }
                    if (inputCode.trim() !== ACTIVATION_CODE) {
                        Swal.showValidationMessage('⚠️ كود التفعيل غير صحيح');
                        return false;
                    }
                    return inputCode;
                }
            });

            if (code && code.trim() === ACTIVATION_CODE) {
                activatePremium();
            }
        }

        function activatePremium() {
            currentUser = {
                isPremium: true,
                plan: 'pro',
                activatedAt: Date.now()
            };
            saveUserStatus();
            updateUIForUser();

            Swal.fire({
                icon: 'success',
                title: '🎉 تم التفعيل بنجاح!',
                html: `تم تفعيل جميع الميزات المدفوعة:<br>
                       ✅ تخصيص حجم الكود<br>
                       ✅ تخصيص ألوان الكود<br>
                       ✅ إضافة شعار مخصص`,
                confirmButtonColor: '#667eea',
                timer: 3000,
                timerProgressBar: true
            });
        }

        function checkPremiumFeature(featureName) {
            if (!currentUser.isPremium) {
                Swal.fire({
                    icon: 'warning',
                    title: '⭐ ميزة مدفوعة',
                    text: `ميزة "${featureName}" متاحة فقط بعد التفعيل`,
                    confirmButtonText: '🔑 تفعيل الآن',
                    cancelButtonText: 'تذكر لاحقاً',
                    showCancelButton: true,
                    confirmButtonColor: '#f5576c'
                }).then((result) => {
                    if (result.isConfirmed) {
                        showSubscriptionPlans();
                    }
                });

                const container = document.querySelector('.container');
                container.classList.add('locked');
                setTimeout(() => container.classList.remove('locked'), 300);
                return false;
            }
            return true;
        }

        // ============================================
        // VALIDATION FUNCTIONS
        // ============================================

        function validateWifiSSID(input) {
            const error = document.getElementById('wifi-ssid-error');
            if (input.value.length < 1) {
                error.textContent = '⚠️ اسم الشبكة مطلوب';
                return false;
            }
            error.textContent = '';
            return true;
        }

        function validatePhone(input) {
            const phone = input.value.replace(/\D/g, '');
            const errorId = input.id === 'wa-phone' ? 'wa-phone-error' : 'card-phone-error';
            const error = document.getElementById(errorId);

            if (phone.length > 0 && phone.length < 10) {
                error.textContent = '⚠️ رقم الهاتف يجب أن يكون 10 أرقام على الأقل';
                return false;
            }
            error.textContent = '';
            return true;
        }

        function validateEmail(input) {
            const error = document.getElementById('card-email-error');
            const email = input.value.trim();

            if (email && !email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) {
                error.textContent = '⚠️ بريد إلكتروني غير صحيح';
                return false;
            }
            error.textContent = '';
            return true;
        }

        function validateLogo(input) {
            const error = document.getElementById('logo-error');
            const file = input.files[0];

            if (file) {
                if (file.size > MAX_LOGO_SIZE) {
                    error.textContent = `⚠️ حجم الشعار كبير جداً (الحد الأقصى ${MAX_LOGO_SIZE / 1024 / 1024}MB)`;
                    input.value = '';
                    return false;
                }
                if (!file.type.startsWith('image/')) {
                    error.textContent = '⚠️ الرجاء اختيار ملف صورة صالح';
                    input.value = '';
                    return false;
                }
                error.textContent = '✅ تم اختيار الشعار بنجاح';
                return true;
            }
            error.textContent = '';
            return true;
        }

        function updateCharCount(textarea, displayId) {
            const count = textarea.value.length;
            const display = document.getElementById(displayId);
            display.textContent = `${count} / ${MAX_MESSAGE_LENGTH}`;

            if (count > MAX_MESSAGE_LENGTH) {
                textarea.value = textarea.value.substring(0, MAX_MESSAGE_LENGTH);
                display.textContent = `${MAX_MESSAGE_LENGTH} / ${MAX_MESSAGE_LENGTH}`;
                display.style.color = '#e74c3c';
            } else {
                display.style.color = '';
            }
        }

        function togglePasswordVisibility(inputId) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
            } else {
                input.type = 'password';
            }
        }

        // ============================================
        // UI UPDATES
        // ============================================

        function updateSizeDisplay(inputId, displayId) {
            const input = document.getElementById(inputId);
            const display = document.getElementById(displayId);
            display.textContent = input.value + 'px';

        function updateColorPreview() {

        // ============================================
        // TAB SWITCHING
        // ============================================

        function switchTab(event, tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.form-section').forEach(sec => sec.classList.remove('active'));

            event.target.classList.add('active');
            document.getElementById(tabName + '-section').classList.add('active');
            document.getElementById('qr-result-section').style.display = 'none';
        }

        // ============================================
        // QR CODE GENERATION
        // ============================================

        async function generateQR(type) {
            let qrText = "";
            let options = {
                size: 250,
                background: '#ffffff',
                foreground: '#000000',
                level: 'H'
            };

            // Clear previous errors
            clearErrors();

            // Get error correction level
            const errorLevel = document.getElementById(`${type === 'wifi' ? 'wifi' : 'whatsapp'}-error-level`);
            if (errorLevel) {
                options.level = errorLevel.value;
            }

            if (type === 'wifi') {
                const ssid = document.getElementById('wifi-ssid').value.trim();
                const pass = document.getElementById('wifi-pass').value.trim();

                if (!ssid) {
                    showError('wifi-ssid-error', 'يرجى إدخال اسم الشبكة');
                    return;
                }

                qrText = `WIFI:S:${escapeWifiString(ssid)};T:WPA;P:${escapeWifiString(pass)};;`;

                // Premium: custom size
                const customSize = parseInt(document.getElementById('wifi-size').value);
                if (customSize !== 250) {
                    if (!checkPremiumFeature('تخصيص حجم الكود')) return;
                    options.size = customSize;
                }
            } else if (type === 'whatsapp') {
                const phone = document.getElementById('wa-phone').value.trim();
                const msg = document.getElementById('wa-msg').value.trim();

                if (!phone) {
                    showError('wa-phone-error', 'يرجى إدخال رقم الهاتف');
                    return;
                }

                // Clean phone number
                const cleanPhone = phone.replace(/\D/g, '');
                if (cleanPhone.length < 10) {
                    showError('wa-phone-error', 'رقم الهاتف يجب أن يكون 10 أرقام على الأقل');
                    return;
                }

                qrText = `https://wa.me/${cleanPhone}?text=${encodeURIComponent(msg)}`;

                // Premium: custom colors
                const bgColor = document.getElementById('wa-bg-color').value;
                const fgColor = document.getElementById('wa-fg-color').value;

                if (bgColor !== '#ffffff' || fgColor !== '#000000') {
                    if (!checkPremiumFeature('تخصيص ألوان الكود')) return;
                    options.background = bgColor;
                    options.foreground = fgColor;
                }
            } else if (type === 'vcard') {
                const name = document.getElementById('card-name').value.trim();
                const phone = document.getElementById('card-phone').value.trim();
                const email = document.getElementById('card-email').value.trim();

                if (!name || !phone) {
                    showError('card-phone-error', 'يرجى ملء الاسم والهاتف على الأقل');
                    return;
                }

                // Clean phone for vCard
                const cleanPhone = phone.replace(/\D/g, '');

                // Build vCard
                let vcardParts = [
                    'BEGIN:VCARD',
                    'VERSION:3.0',
                    `FN:${name}`,
                    `TEL:${cleanPhone}`
                ];

                if (email) {
                    if (!validateEmail(document.getElementById('card-email'))) return;
                    vcardParts.push(`EMAIL:${email}`);
                }

                vcardParts.push('END:VCARD');
                qrText = vcardParts.join('\n');

                // Premium: logo
                const logoFile = document.getElementById('vcard-logo').files[0];
                if (logoFile) {
                    if (!checkPremiumFeature('إضافة شعار مخصص')) return;
                    try {
                        options.logo = await readLogoFile(logoFile);
                    } catch (error) {
                        showError('logo-error', error.message);
                        return;
                    }
                }
            }

            // Update stats
            incrementStats(type);

            // Generate QR
            await renderQRCode(qrText, options);
            lastGeneratedQR = {
                text: qrText,
                options
            };
        }

        function escapeWifiString(str) {
            return str.replace(/[\\;,:]/g, '\\$&');
        }

        function clearErrors() {
            document.querySelectorAll('.warning-text').forEach(el => {
                el.textContent = '';
            });
        }

        function showError(elementId, message) {
            const element = document.getElementById(elementId);
            if (element) {
                element.textContent = '⚠️ ' + message;
            }
        }

        // ============================================
        // QR RENDERING
        // ============================================

        async function renderQRCode(qrText, options) {
            const canvas = document.getElementById('qr-canvas');
            const resultSection = document.getElementById('qr-result-section');

            try {
                // Create QR code
                const qr = new QRious({
                    element: canvas,
                    value: qrText,
                    size: options.size || 250,
                    level: options.level || 'H',
                    background: options.background || '#ffffff',
                    foreground: options.foreground || '#000000'
                });

                resultSection.style.display = 'block';

                // Add logo if exists
                if (options.logo && currentUser.isPremium) {
                    await addLogoToQR(canvas, options.logo);
                }

                // Smooth scroll to result
                resultSection.scrollIntoView({
                    behavior: 'smooth',
                    block: 'nearest'
                });

            } catch (error) {
                console.error('QR Generation error:', error);
                Swal.fire({
                    icon: 'error',
                    title: 'خطأ',
                    text: 'حدث خطأ أثناء توليد الكود: ' + error.message,
                    confirmButtonColor: '#764ba2'
                });
            }
        }

        function readLogoFile(file) {
            return new Promise((resolve, reject) => {
                if (file.size > MAX_LOGO_SIZE) {
                    reject(new Error(`حجم الشعار كبير جداً (الحد الأقصى ${MAX_LOGO_SIZE / 1024 / 1024}MB)`));
                    return;
                }

                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.onerror = () => reject(new Error('فشل في قراءة الملف'));
                reader.readAsDataURL(file);
            });
        }

        function addLogoToQR(canvas, logoDataUrl) {
            return new Promise((resolve) => {
                const ctx = canvas.getContext('2d');
                const img = new Image();

                img.onload = () => {
                    const size = canvas.width;
                    const logoSize = size * 0.22;
                    const x = (size - logoSize) / 2;
                    const y = (size - logoSize) / 2;

                    // White background for logo
                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath();
                    ctx.roundRect(x - 5, y - 5, logoSize + 10, logoSize + 10, 8);
                    ctx.fill();

                    // Draw logo
                    ctx.drawImage(img, x, y, logoSize, logoSize);
                    resolve();
                };

                img.onerror = () => resolve();
                img.src = logoDataUrl;
            });
        }

        // ============================================
        // EXPORT FUNCTIONS
        // ============================================

        function downloadQR() {
            const canvas = document.getElementById('qr-canvas');
            const format = document.getElementById('export-format').value;

            let mimeType = 'image/png';
            let extension = 'png';

            switch (format) {
                case 'jpg':
                    mimeType = 'image/jpeg';
                    extension = 'jpg';
                    break;
                case 'svg':
                    // For SVG, we need to use the QRious SVG output
                    exportAsSVG(canvas);
                    return;
                case 'pdf':
                    exportAsPDF(canvas);
                    return;
                default:
                    mimeType = 'image/png';
                    extension = 'png';
            }

            const link = document.createElement('a');
            link.download = `QR-${Date.now()}.${extension}`;
            link.href = canvas.toDataURL(mimeType, 1.0);
            link.click();
        }

        function exportAsSVG(canvas) {
            try {
                // Get QR data from the canvas
                const ctx = canvas.getContext('2d');
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;

                // Simple SVG generation - creates a grid of rectangles
                const size = canvas.width;
                const cellSize = size / 21; // QR code is typically 21x21 for version 1
                let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">`;

                for (let y = 0; y < size; y += cellSize) {
                    for (let x = 0; x < size; x += cellSize) {
                        const index = (Math.floor(y) * size + Math.floor(x)) * 4;
                        const r = data[index];
                        const g = data[index + 1];
                        const b = data[index + 2];
                        const isDark = (r + g + b) / 3 < 128;

                        if (isDark) {
                            svg += `<rect x="${x}" y="${y}" width="${cellSize}" height="${cellSize}" fill="black" />`;
                        }
                    }
                }

                svg += '</svg>';

                const blob = new Blob([svg], {
                    type: 'image/svg+xml'
                });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.download = `QR-${Date.now()}.svg`;
                link.href = url;
                link.click();
                URL.revokeObjectURL(url);

            } catch (error) {
                console.error('SVG export error:', error);
                Swal.fire({
                    icon: 'error',
                    title: 'خطأ',
                    text: 'فشل تصدير SVG',
                    confirmButtonColor: '#764ba2'
                });
            }
        }

        function exportAsPDF(canvas) {
            // Simple PDF export using the image
            const imgData = canvas.toDataURL('image/png');

            // Use a simple approach - create a link with the image
            const link = document.createElement('a');
            link.download = `QR-${Date.now()}.pdf`;
            link.href = imgData;
            link.click();

            // Note: For proper PDF generation, you might want to use jsPDF library
            // This is a simplified version
        }

        function downloadQRData() {
            const data = {
                qrText: lastGeneratedQR.text,
                options: lastGeneratedQR.options,
                generatedAt: new Date().toISOString(),
                user: {
                    isPremium: currentUser.isPremium,
                    plan: currentUser.plan
                },
                stats: stats
            };

            const blob = new Blob([JSON.stringify(data, null, 2)], {
                type: 'application/json'
            });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.download = `QR-data-${Date.now()}.json`;
            link.href = url;
            link.click();
            URL.revokeObjectURL(url);
        }

        // ============================================
        // INITIALIZATION
        // ============================================

        document.addEventListener('DOMContentLoaded', function() {
            loadTheme();
            loadUserStatus();

            // Initialize size displays
            document.querySelectorAll('input[type="range"]').forEach(input => {
                const displayId = input.id + '-value';
                const display = document.getElementById(displayId);
                if (display) {
                    display.textContent = input.value + 'px';
                }
            });

            // Initialize color preview for premium users
            if (currentUser.isPremium) {
                updateColorPreview();
            }

            // Add roundRect polyfill if needed
            if (!CanvasRenderingContext2D.prototype.roundRect) {
                CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                    if (r > w / 2) r = w / 2;
                    if (r > h / 2) r = h / 2;
                    this.moveTo(x + r, y);
                    this.arcTo(x + w, y, x + w, y + h, r);
                    this.arcTo(x + w, y + h, x, y + h, r);
                    this.arcTo(x, y + h, x, y, r);
                    this.arcTo(x, y, x + w, y, r);
                    return this;
                };
            }

            // Add keyboard shortcut for theme toggle (Ctrl+Shift+D)
            document.addEventListener('keydown', (e) => {
                if (e.ctrlKey && e.shiftKey && e.key === 'D') {
                    e.preventDefault();
                    toggleTheme();
                }
            });
        });

        // Handle Enter key for form submission
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const activeSection = document.querySelector('.form-section.active');
                if (activeSection) {
                    const type = activeSection.id.replace('-section', '');
                    generateQR(type);
                }
            }
        });

        console.log('🚀 QR Master Pro loaded successfully!');
        console.log('📊 Current stats:', stats);
        console.log('👤 User status:', currentUser);
        console.log('💡 Activation code: 0155110');
        console.log('🔑 Press Ctrl+Shift+D to toggle dark mode');
    </script>
